---
- hosts: 127.0.0.1
  connection: local
  gather_facts: yes
  become: yes
  #vars_files:
  #  - ./external_vars.yaml
  roles:
    - role: nginx
      tags: nginx_tag
    - role: fluentd
      tags: fluentd
    - role: rsyslogd
      tags: rsyslogd_tag
    - role: docker
      tags: docker_tag
  tasks:

    ##################################################
    # Configure Nginx as a reverse proxy
    # This configuration is dependent on the SRC-NGINX component provided by Surf
    
    # Create authentication script
    - name: Ensure auth directory exists
      file:
        path: /auth
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Create auth.sh script
      copy:
        dest: /auth/auth.sh
        content: |
          #!/bin/bash
          username="$USERNAME"
          userid=$(id -u "$username" 2>/dev/null)
          if [ $? -ne 0 ]; then
              echo -e "Status: 403 Forbidden\n"
              echo "Authorization failed"
          else
              echo "Status: 200"
              echo "X-Accel-Redirect: /protected"
              echo "X-Username: $username"
              echo ""
          fi
        owner: www-data
        group: www-data
        mode: '0755'
    
    - name: Add ansible markers in /etc/nginx/conf.d/tls_main.conf
      replace:
        path: /etc/nginx/conf.d/tls_main.conf
        regexp: '^\s*include /etc/nginx/app-location-conf\.d/\*\.conf;\s*$'
        replace: "    include /etc/nginx/app-location-conf.d/*.conf;\n    # BEGIN ANSIBLE MANAGED BLOCK\n    # END ANSIBLE MANAGED BLOCK"

    # Configure Nginx as reverse proxy added configs for Phoenix
    # The admin route is protected by Surf SRAM
    - name: Fill the location block of the ssl block
      blockinfile:
        path: /etc/nginx/conf.d/tls_main.conf
        marker: "    # {mark} ANSIBLE MANAGED BLOCK"
        block: |
          location /admin {
            error_page 401 = @custom_401;
            auth_request /validate;
            auth_request_set $username $upstream_http_username;

            include /etc/nginx/fastcgi_params;
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
            fastcgi_param SCRIPT_FILENAME /auth/auth.sh;
            fastcgi_param USERNAME $username;
          }

          location /protected {
            internal;

            set $username_param "";
            if ($http_x_username != "") {
              set $username "$http_x_username";
            }

            proxy_pass                http://localhost:8000/admin/login/$username;
            proxy_set_header          X-Forwarded-Proto $scheme;
            proxy_set_header          X-Forwarded-For $remote_addr;
            proxy_set_header          X-Real-IP $remote_addr;
            proxy_set_header          Host $http_host;
            proxy_http_version        1.1;
            proxy_set_header          Upgrade $http_upgrade;
            proxy_set_header          Connection "upgrade";
            proxy_max_temp_file_size  1m;
          }

          location / {
            allow all;
            proxy_pass                http://localhost:8000;
            proxy_set_header          X-Forwarded-Proto $scheme;
            proxy_set_header          X-Forwarded-For $remote_addr;
            proxy_set_header          X-Real-IP $remote_addr;
            proxy_set_header          Host $http_host;
            proxy_http_version        1.1;
            proxy_set_header          Upgrade $http_upgrade;
            proxy_set_header          Connection "upgrade";
            proxy_max_temp_file_size  1m;
          }

    - name: Check whether the nginx configuration is valid
      shell: nginx -t

    - name: Restart the Nginx service
      ansible.builtin.systemd:
        name: nginx.service
        state: restarted
        daemon_reload: true

    ##################################################
    # Build and Run Next with Docker
    
    - name: Clone Next from Github
      git:
        repo: https://github.com/d3i-infra/mono
        update: yes
        dest: ./mono

    # build
    - name: Build Next with Docker build
      shell:
        cmd: docker build --build-arg VERSION=1.0.0 --build-arg BUNDLE=self --build-arg PLATFORM=aws --build-arg FORCE_SSL=false --target prod . -t self-d3i:latest
        chdir: mono

    # deploy
    - name: Create Docker Compose file from template
      template:
        src: templates/docker-compose.yml.j2
        dest: /docker-compose.yaml

    - name: Start container using the compose file
      command: docker compose up -d
      args:
        chdir: /
